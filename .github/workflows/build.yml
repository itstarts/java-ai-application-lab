name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/**/pom.xml
        # setup-java 在指定 java-version 时自动写入 ~/.m2/toolchains.xml，
        # 供 maven-toolchains-plugin 匹配 JDK 21。

      - name: Test
        working-directory: backend
        run: ./mvnw -B test
